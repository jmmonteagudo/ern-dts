name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: CDS compile check
        run: npx cds compile srv/ --to json > /dev/null

      - name: ESLint
        run: npm run lint -- --max-warnings 0
        continue-on-error: false

  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Start CAP server
        run: |
          npx cds-serve &
          npx wait-on http-get://localhost:4004/products/webapp/test/unit/unitTests.qunit.html --timeout 30000

      - name: Run QUnit tests
        run: node scripts/run-qunit-tests.js