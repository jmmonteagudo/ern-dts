<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ern — Product Management</title>
  <script>
    window["sap-ushell-config"] = {
      defaultRenderer: "fiori2",
      applications: {
        "preview-app": {
          title: "Product Management",
          description: "Ern Products",
          additionalInformation: "SAPUI5.Component=erndts.products",
          applicationType: "URL",
          url: "./",
          navigationMode: "embedded"
        }
      }
    };
  </script>
  <script id="sap-ushell-bootstrap" src="https://sapui5.hana.ondemand.com/1.133.0/test-resources/sap/ushell/bootstrap/sandbox.js"></script>
  <script id="sap-ui-bootstrap" src="https://sapui5.hana.ondemand.com/1.133.0/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow"
    data-sap-ui-resourceroots='{"erndts.products": "./"}'>
  </script>
  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ushell.Container.createRenderer().placeAt("content");
    });
  </script>
</head>
<body class="sapUiBody" id="content">
</body>
</html>
